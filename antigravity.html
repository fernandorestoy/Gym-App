<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity Gym</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
/* ========================================
   ANTIGRAVITY GYM - Styles
   ======================================== */

:root {
  --bg-primary: #0D0D0D;
  --bg-card: #1A1A2E;
  --bg-card-hover: #222240;
  --bg-card-header: #16213E;
  --text-primary: #F5F5F5;
  --text-secondary: #A0A0B0;
  --text-muted: #6C6C80;
  --border-color: #2A2A4A;
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.3s ease;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

  /* Muscle group accent colors */
  --color-gluteos: #E74C3C;
  --color-brazos: #3498DB;
  --color-pecho: #2ECC71;
  --color-espalda: #9B59B6;
  --color-hombros: #F39C12;
  --color-core: #1ABC9C;

  /* Equipment colors */
  --eq-mancuernas: #3498DB;
  --eq-maquina: #2ECC71;
  --eq-cintas: #F39C12;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ---- Header ---- */
.app-header {
  text-align: center;
  padding: 2rem 1rem 1rem;
}

.logo {
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: 0.15em;
  background: linear-gradient(135deg, #E74C3C, #F39C12, #2ECC71, #3498DB, #9B59B6);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 6s ease infinite;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.subtitle {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-top: 0.25rem;
  letter-spacing: 0.05em;
}

/* ---- Main Container ---- */
#app {
  max-width: 800px;
  margin: 0 auto;
  padding: 1rem;
}

/* ---- Home Screen: Muscle Group Grid ---- */
.home-screen {
  animation: fadeIn 0.3s ease;
}

.home-title {
  text-align: center;
  font-size: 1.1rem;
  color: var(--text-secondary);
  margin-bottom: 1.5rem;
  font-weight: 400;
}

.muscle-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1rem;
}

.muscle-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  padding: 1.5rem 1rem;
  background: var(--bg-card);
  border: 2px solid var(--border-color);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font);
  color: var(--text-primary);
  text-align: center;
}

.muscle-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
}

.muscle-btn .icon {
  font-size: 2.5rem;
  line-height: 1;
}

.muscle-btn .label {
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.03em;
}

.muscle-btn .day-detail {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 400;
}

.day-description {
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 1rem;
  font-style: italic;
}

/* ---- Exercise Screen ---- */
.exercise-screen {
  animation: fadeIn 0.3s ease;
}

.exercise-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.btn-back {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  background: none;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 0.85rem;
  padding: 0.5rem 1rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn-back:hover {
  background: var(--bg-card);
  color: var(--text-primary);
}

.exercise-group-title {
  font-size: 1.3rem;
  font-weight: 700;
  flex: 1;
}

.btn-refresh {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 0.85rem;
  padding: 0.6rem 1.2rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 1rem;
  width: 100%;
  justify-content: center;
  font-weight: 600;
}

.btn-refresh:hover {
  background: var(--bg-card-hover);
  transform: translateY(-1px);
}

.btn-refresh .refresh-icon {
  display: inline-block;
  transition: transform 0.4s ease;
}

.btn-refresh:hover .refresh-icon {
  transform: rotate(180deg);
}

/* ---- Exercise Cards ---- */
.exercise-list {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.exercise-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color var(--transition);
}

.exercise-card.open {
  border-color: var(--accent-color, var(--border-color));
}

.card-header {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  padding: 0.85rem 1.2rem;
  cursor: pointer;
  transition: background var(--transition);
  gap: 0.5rem;
  user-select: none;
}

.card-header:hover {
  background: var(--bg-card-hover);
}

.card-number {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
  background: rgba(255, 255, 255, 0.05);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.card-title {
  flex: 1;
  font-size: 0.95rem;
  font-weight: 600;
  min-width: 0;
}

.group-badge {
  font-size: 0.68rem;
  font-weight: 700;
  padding: 0.2rem 0.55rem;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  flex-shrink: 0;
  white-space: nowrap;
}

.equipment-badge {
  font-size: 0.7rem;
  font-weight: 600;
  padding: 0.25rem 0.6rem;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}

.equipment-badge.mancuernas {
  background: rgba(52, 152, 219, 0.15);
  color: var(--eq-mancuernas);
}

.equipment-badge.maquina {
  background: rgba(46, 204, 113, 0.15);
  color: var(--eq-maquina);
}

.equipment-badge.cintas {
  background: rgba(243, 156, 18, 0.15);
  color: var(--eq-cintas);
}

.card-arrow {
  color: var(--text-muted);
  transition: transform var(--transition);
  flex-shrink: 0;
  font-size: 0.8rem;
}

.exercise-card.open .card-arrow {
  transform: rotate(90deg);
}

/* ---- Card Body (Accordion) ---- */
.card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.card-body-inner {
  padding: 0 1.2rem 1.2rem;
}

/* ---- YouTube Button ---- */
.yt-btn {
  display: flex;
  align-items: center;
  gap: 1rem;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  border: 1px solid rgba(255, 0, 0, 0.25);
  border-radius: var(--radius-sm);
  padding: 1rem 1.2rem;
  margin-bottom: 1rem;
  text-decoration: none;
  color: var(--text-primary);
  transition: all var(--transition);
  cursor: pointer;
}

.yt-btn:hover {
  border-color: rgba(255, 0, 0, 0.6);
  background: linear-gradient(135deg, #22223a 0%, #1c2a50 100%);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(255, 0, 0, 0.15);
}

.yt-icon {
  font-size: 1.8rem;
  width: 44px;
  height: 44px;
  background: #FF0000;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(255, 0, 0, 0.4);
  color: white;
  font-size: 1rem;
  padding-left: 3px;
}

.yt-text {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
  flex: 1;
}

.yt-label {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text-primary);
}

.yt-sub {
  font-size: 0.75rem;
  color: var(--text-muted);
}

.yt-logo {
  font-size: 0.7rem;
  font-weight: 700;
  color: #FF4444;
  letter-spacing: 0.03em;
  flex-shrink: 0;
}

.exercise-svg-container svg {
  width: 100%;
  max-width: 400px;
  height: auto;
}

.exercise-description {
  color: var(--text-secondary);
  font-size: 0.9rem;
  line-height: 1.6;
  margin-bottom: 1rem;
}

.steps-list {
  list-style: none;
  counter-reset: step;
  margin-bottom: 1rem;
}

.steps-list li {
  counter-increment: step;
  padding: 0.5rem 0 0.5rem 2.2rem;
  position: relative;
  color: var(--text-secondary);
  font-size: 0.88rem;
  line-height: 1.5;
  border-bottom: 1px solid rgba(255, 255, 255, 0.03);
}

.steps-list li:last-child {
  border-bottom: none;
}

.steps-list li::before {
  content: counter(step);
  position: absolute;
  left: 0;
  top: 0.5rem;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  font-size: 0.72rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}

.exercise-tip {
  background: rgba(255, 255, 255, 0.04);
  border-left: 3px solid var(--accent-color, #F39C12);
  padding: 0.75rem 1rem;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.5;
}

.exercise-tip strong {
  color: var(--text-primary);
}

/* ---- Animations ---- */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.exercise-card {
  animation: fadeIn 0.3s ease both;
}

.exercise-card:nth-child(1) { animation-delay: 0.02s; }
.exercise-card:nth-child(2) { animation-delay: 0.04s; }
.exercise-card:nth-child(3) { animation-delay: 0.06s; }
.exercise-card:nth-child(4) { animation-delay: 0.08s; }
.exercise-card:nth-child(5) { animation-delay: 0.10s; }
.exercise-card:nth-child(6) { animation-delay: 0.12s; }
.exercise-card:nth-child(7) { animation-delay: 0.14s; }
.exercise-card:nth-child(8) { animation-delay: 0.16s; }

/* ---- Responsive ---- */
@media (min-width: 600px) {
  .muscle-grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .muscle-btn {
    padding: 2rem 1rem;
  }

  .muscle-btn .icon {
    font-size: 3rem;
  }

  .logo {
    font-size: 2.8rem;
  }

  .exercise-header {
    gap: 1.5rem;
  }
}

@media (min-width: 900px) {
  .muscle-btn {
    padding: 2.5rem 1.5rem;
  }

  .muscle-btn .label {
    font-size: 1.05rem;
  }
}

  </style>
</head>
<body>

    <p class="subtitle">Tu entrenador personal</p>

  <main id="app"></main>
  <script>

const app = document.getElementById("app");

// ---- Muscle group label map ----
const groupLabels = {
  "hombros":         { name: "Hombros",           color: "#F39C12" },
  "brazos":          { name: "Brazos",             color: "#3498DB" },
  "pecho":           { name: "Pecho",              color: "#2ECC71" },
  "espalda":         { name: "Espalda",            color: "#9B59B6" },
  "core":            { name: "Abdominales",        color: "#1ABC9C" },
  "gluteos-piernas": { name: "Piernas",            color: "#E74C3C" },
  "gluteos":         { name: "Glúteos",            color: "#E74C3C" },
  "cuadriceps":      { name: "Cuádriceps",         color: "#E67E22" },
  "isquiotibiales":  { name: "Isquiotibiales",     color: "#D35400" },
};

// ---- Helpers ----

function pickRandom(arr, count) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, Math.min(count, shuffled.length));
}

// Tag exercises with their muscle group id
function tag(list, groupId) {
  return list.map((ex) => ({ ...ex, _group: groupId }));
}

// Intercalate: weave arrays together [a1, b1, a2, b2, a3, b3...]
function intercalate(...arrays) {
  const result = [];
  const maxLen = Math.max(...arrays.map((a) => a.length));
  for (let i = 0; i < maxLen; i++) {
    for (const arr of arrays) {
      if (i < arr.length) result.push(arr[i]);
    }
  }
  return result;
}

function equipmentLabel(eq) {
  const map = { mancuernas: "Mancuernas", maquina: "Máquina", cintas: "Cintas" };
  return map[eq] || eq;
}

function equipmentClass(eq) {
  return eq;
}

function getGroupColor(exercise) {
  if (exercise._group && groupLabels[exercise._group]) {
    return groupLabels[exercise._group].color;
  }
  for (const group of muscleGroups) {
    const groupExercises = exercises[group.id] || [];
    if (groupExercises.some((e) => e.id === exercise.id)) {
      return group.color;
    }
  }
  return "#888";
}

function getGroupLabel(exercise) {
  if (exercise._group && groupLabels[exercise._group]) {
    return groupLabels[exercise._group];
  }
  return { name: "Ejercicio", color: "#888" };
}

// ---- Workout Day Definitions ----

const workoutDays = [
  {
    id: "day1",
    dayNum: 1,
    name: "Hombros y Brazos",
    icon: "🙆",
    color: "#F39C12",
    description: "2 hombros + 1 brazo + 3 abdominales",
    build() {
      const shoulders = tag(pickRandom(exercises["hombros"], 2), "hombros");
      const arms = tag(pickRandom(exercises["brazos"], 1), "brazos");
      const abs = tag(pickRandom(exercises["core"], 3), "core");
      // Intercalate: shoulder, abs, shoulder, abs, arm, abs
      const main = [...shoulders, ...arms]; // 3 items
      return intercalate(main, abs);
    },
  },
  {
    id: "day2",
    dayNum: 2,
    name: "Pecho",
    icon: "🏋️",
    color: "#2ECC71",
    description: "3 pecho + 3 abdominales",
    build() {
      const chest = tag(pickRandom(exercises["pecho"], 3), "pecho");
      const abs = tag(pickRandom(exercises["core"], 3), "core");
      return intercalate(chest, abs);
    },
  },
  {
    id: "day3",
    dayNum: 3,
    name: "Espalda",
    icon: "🔄",
    color: "#9B59B6",
    description: "3 espalda + 3 abdominales",
    build() {
      const back = tag(pickRandom(exercises["espalda"], 3), "espalda");
      const abs = tag(pickRandom(exercises["core"], 3), "core");
      return intercalate(back, abs);
    },
  },
  {
    id: "day4",
    dayNum: 4,
    name: "Piernas",
    icon: "🦵",
    color: "#E74C3C",
    description: "2 glúteos + 2 cuádriceps + 1 isquio + 1 core",
    build() {
      const legs = exercises["gluteos-piernas"];
      const gluteIds = [
        "abduccion-cadera", "patada-gluteo-polea", "clamshell-banda",
        "puente-gluteos-banda", "monster-walk", "aduccion-cadera",
      ];
      const hamstringIds = [
        "peso-muerto-rumano-mancuernas", "curl-isquiotibiales", "peso-muerto-banda",
      ];
      const quadExercises = legs.filter(
        (e) => !gluteIds.includes(e.id) && !hamstringIds.includes(e.id)
      );
      const gluteExercises = legs.filter((e) => gluteIds.includes(e.id));
      const hamstringExercises = legs.filter((e) => hamstringIds.includes(e.id));

      const glutes = tag(pickRandom(gluteExercises, 2), "gluteos");
      const quads = tag(pickRandom(quadExercises, 2), "cuadriceps");
      const hams = tag(pickRandom(hamstringExercises, 1), "isquiotibiales");
      const core = tag(pickRandom(exercises["core"], 1), "core");
      // Intercalate: glute, quad, glute, quad, ham, core
      return intercalate(glutes, quads, hams, core);
    },
  },
];

// ---- Render: Home Screen (4-Day Selector) ----

function renderHome() {
  const buttons = workoutDays
    .map(
      (day) => `
    <button class="muscle-btn" data-day="${day.id}" style="border-color: ${day.color}30;">
      <span class="icon">${day.icon}</span>
      <span class="label">Día ${day.dayNum}</span>
      <span class="day-detail">${day.name}</span>
    </button>`
    )
    .join("");

  app.innerHTML = `
    <div class="home-screen">
      <p class="home-title">Elige tu día de entrenamiento</p>
      <div class="muscle-grid">${buttons}</div>
    </div>`;

  app.querySelectorAll(".muscle-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      renderDay(btn.dataset.day);
    });
  });
}

// ---- Render: Day Exercises ----

function renderDay(dayId) {
  const day = workoutDays.find((d) => d.id === dayId);
  if (!day) return;

  const selected = day.build();

  const cards = selected
    .map((ex, i) => {
      const color = getGroupColor(ex);
      const group = getGroupLabel(ex);
      const steps = ex.steps.map((s) => `<li>${s}</li>`).join("");

      // YouTube search URL filtered to short videos (< 4 min), sp=EgIYAQ%3D%3D
      const query = encodeURIComponent(ex.name + " ejercicio como hacer");
      const ytUrl = `https://www.youtube.com/results?search_query=${query}&sp=EgIYAQ%3D%3D`;

      return `
      <div class="exercise-card" style="--accent-color: ${color};">
        <div class="card-header" data-index="${i}">
          <span class="card-number">${i + 1}</span>
          <span class="card-title">${ex.name}</span>
          <span class="group-badge" style="background: ${group.color}22; color: ${group.color};">${group.name}</span>
          <span class="equipment-badge ${equipmentClass(ex.equipment)}">${equipmentLabel(ex.equipment)}</span>
          <span class="card-arrow">&#9654;</span>
        </div>
        <div class="card-body">
          <div class="card-body-inner">
            <a class="yt-btn" href="${ytUrl}" target="_blank" rel="noopener noreferrer">
              <span class="yt-icon">&#9654;</span>
              <span class="yt-text">
                <span class="yt-label">Ver tutorial</span>
                <span class="yt-sub">Videos cortos en YouTube</span>
              </span>
              <span class="yt-logo">▶ YouTube</span>
            </a>
            <p class="exercise-description">${ex.description}</p>
            <ol class="steps-list">${steps}</ol>
            ${ex.tips ? `<div class="exercise-tip"><strong>Tip:</strong> ${ex.tips}</div>` : ""}
          </div>
        </div>
      </div>`;
    })
    .join("");

  app.innerHTML = `
    <div class="exercise-screen">
      <div class="exercise-header">
        <button class="btn-back">&#8592; Volver</button>
        <h2 class="exercise-group-title" style="color: ${day.color};">Día ${day.dayNum}: ${day.name}</h2>
      </div>
      <p class="day-description">${day.description}</p>
      <button class="btn-refresh">
        <span class="refresh-icon">&#8635;</span> Nueva rutina
      </button>
      <div class="exercise-list">${cards}</div>
    </div>`;

  app.querySelector(".btn-back").addEventListener("click", renderHome);
  app.querySelector(".btn-refresh").addEventListener("click", () => renderDay(dayId));

  // Accordion toggle
  app.querySelectorAll(".card-header").forEach((header) => {
    header.addEventListener("click", () => {
      const card = header.parentElement;
      const body = card.querySelector(".card-body");
      const isOpen = card.classList.contains("open");

      app.querySelectorAll(".exercise-card.open").forEach((openCard) => {
        if (openCard !== card) {
          openCard.classList.remove("open");
          openCard.querySelector(".card-body").style.maxHeight = null;
        }
      });

      if (isOpen) {
        card.classList.remove("open");
        body.style.maxHeight = null;
      } else {
        card.classList.add("open");
        body.style.maxHeight = body.scrollHeight + "px";
      }
    });
  });
}

// ---- Init ----
renderHome();

  </script>
</body>
</html>
